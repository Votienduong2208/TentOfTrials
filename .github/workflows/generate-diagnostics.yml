name: Generate diagnostics

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to build
        required: true
        default: feat/buddy-allocator-139
      module:
        description: Module passed to build.py
        required: true
        default: frailbox

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          repository: Votienduong2208/TentOfTrials
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "COMMIT_ID=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_ENV"

      - name: Run diagnostics
        run: python3 build.py -m "${{ inputs.module }}"

      - name: Push script-generated diagnostic commit
        run: git push origin "HEAD:${{ inputs.ref }}"

      - name: List diagnostics
        run: find diagnostic -maxdepth 1 -type f -printf '%p %s bytes\n' | sort || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ env.COMMIT_ID }}-${{ github.run_id }}
          path: diagnostic/build-${{ env.COMMIT_ID }}*
          if-no-files-found: error
